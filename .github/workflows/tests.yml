name: tests

# Gates every push / PR on the backend test suite before any image is shipped.
# Mirrors run_backend_tests_with_sqlite.sh (the quick, Docker-free path).
# Postgres is the primary target locally; adding a Postgres service matrix here
# is a sensible follow-up.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest-sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # setuptools_scm (checkcheckserver/__init__.py) needs git history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend + test dependencies
        working-directory: CheckCheck/backend
        run: |
          python -m pip install --upgrade pip pip-tools setuptools_scm
          pip-compile -o requirements.txt pyproject.toml
          pip install -r requirements.txt
          # dev + test groups (not part of the compiled runtime requirements)
          pip install pytest requests oidc-provider-mock pyyaml

      - name: Run backend test suite (SQLite)
        run: ./run_backend_tests_with_sqlite.sh
